# Render Blueprint — deploys the web service.
#
# The database is provided externally (e.g. a free Neon PostgreSQL at neon.tech),
# because Render allows only one free-tier database per account. Set DATABASE_URL
# to your external connection string after the first sync.
#
# Usage: push to GitHub, then in Render: New > Blueprint > select this repo,
# then set DATABASE_URL (and NEXTAUTH_URL) in the service environment.
services:
  - type: web
    name: ai-travel-planner
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon (or other) PostgreSQL connection string
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false # set to your Render URL, e.g. https://ai-travel-planner.onrender.com
      - key: OPENAI_API_KEY
        sync: false # optional — add your key to enable live AI generation
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SEED_ON_START
        value: "true"
